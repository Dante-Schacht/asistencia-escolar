spring.application.name=asistencia
# ===============================
# CONFIGURACIÓN PARA MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/colegiodb?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cambiado a 'update' para no borrar los datos existentes
spring.jpa.hibernate.ddl-auto=update

# Opcional: Para ver en la consola el código SQL que Spring hace por detrás
spring.jpa.show-sql=true